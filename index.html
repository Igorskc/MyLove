<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kochanieńka ❤️</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

html, body {
    margin: 0;
    min-height: 100%;
    font-family: Montserrat, sans-serif;
    color: #fff;
}

/* TŁO */
.parallax {
    position: fixed;
    inset: 0;
    background-image: url("tlo.jpg");
    background-size: cover;
    background-position: center;
    z-index: -2;
}
.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.3);
    z-index: -1;
}

/* KARTA */
.wrapper {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 40px 20px;
}
.card {
    width: 520px;
    max-width: 95%;
    padding: 30px;
    background: rgba(20,10,18,0.6);
    backdrop-filter: blur(14px);
    border-radius: 25px;
    text-align: center;
}

/* PRZYCISKI */
button {
    margin-top: 12px;
    padding: 10px 18px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    background: rgba(255,255,255,0.25);
    color: white;
}

/* PREZENT */

.gift-box {
    font-size: 3.5rem;
    transition: 0.6s;
}
.opened {
    transform: scale(1.6) rotate(20deg);
    opacity: 0;
}
.hidden { display: none; }

/* ZDJĘCIE */
#birthdayPhoto {
    width: 100%;
    max-width: 260px;
    border-radius: 15px;
    margin: 10px auto;
    display: block;
}

/* KONFETTI */
#confettiCanvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
}

/* KSIĄŻKA */
#book {
    position: relative;
    width: 100%;
    max-width: 420px;
    margin: auto;
}
.book-page {
    background: rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 20px;
    margin-top: 10px;
}
.page {
    white-space: pre-line;
    text-align: left;
}
</style>
</head>
<body>

<audio id="bgMusic" loop>
    <source src="muzyka.mp3">
</audio>

<div class="parallax"></div>
<div class="overlay"></div>

<div class="wrapper">
<div class="card">

<button id="giftBtn">Odpakuj prezent</button>
<div id="message"></div>
<button id="musicBtn">🎵 Play</button>

    <button id="continueBtn">Dalej</button>

<div id="giftOptions" class="hidden">
    <button onclick="openBook('stories')">📖 Opowiadania</button>
    <button onclick="openBook('poems')">✍ Wiersze</button>
</div>

<div id="bookScreen" class="hidden">
    <div id="book">
        <div class="book-page">
            <div id="page" class="page"></div>
        </div>
        <div id="bookControls" class="hidden">
            <button id="prevBtn">←</button>
            <span id="pageNumber"></span>
            <button id="nextBtn">→</button>
        </div>
    </div>
</div>

</div>
</div>

<canvas id="confettiCanvas"></canvas>

// MUZYKA
const music = document.getElementById("bgMusic");
const musicBtn = document.getElementById("musicBtn");

document.addEventListener("click", function startMusic() {
    music.volume = 0.3;
    music.play();
    musicBtn.textContent = "⏸ Pauza";
    document.removeEventListener("click", startMusic);
}, { once: true });

musicBtn.onclick = () => {
    if (music.paused) {
        music.play();
        musicBtn.textContent = "⏸ Pauza";
    } else {
        music.pause();
        musicBtn.textContent = "🎵 Play";
    }
};

const giftIcon = document.getElementById("giftIcon");
const poemScreen = document.getElementById("poemScreen");
const continueBtn = document.getElementById("continueBtn");
const giftOptions = document.getElementById("giftOptions");

giftBtn.onclick = () => {
    giftIcon.classList.add("opened");
    setTimeout(() => {
        giftBtn.style.display = "none";
        giftIcon.style.display = "none";
        startConfetti();
        poemScreen.classList.remove("hidden");
    }, 600);
};

continueBtn.onclick = () => {
    poemScreen.classList.add("hidden");
    giftOptions.classList.remove("hidden");
};

let currentIndex = 0;
let currentList = [];

const page = document.getElementById("page");
const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");
const pageNumber = document.getElementById("pageNumber");

function openBook(type) {
    giftOptions.classList.add("hidden");
    document.getElementById("bookScreen").classList.remove("hidden");

    if(type === "stories") currentList = stories;
    if(type === "poems") currentList = poems;

    currentIndex = 0;
    showPage();
    document.getElementById("bookControls").classList.remove("hidden");
}

function showPage() {
    page.innerText = currentList[currentIndex];
    pageNumber.innerText = `Strona ${currentIndex+1}/${currentList.length}`;
}

nextBtn.onclick = () => {
    if (currentIndex < currentList.length - 1) {
        currentIndex++;
        showPage();
    }
};

prevBtn.onclick = () => {
    if (currentIndex > 0) {
        currentIndex--;
        showPage();
    }
};

// KONFETTI
function startConfetti() {
    const canvas = document.getElementById("confettiCanvas");
    const ctx = canvas.getContext("2d");
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const pieces = [];
    for (let i = 0; i < 150; i++) {
        pieces.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height - canvas.height,
            size: Math.random() * 6 + 4,
            speed: Math.random() * 3 + 2,
            color: `hsl(${Math.random()*360},100%,60%)`
        });
    }

    function update() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        pieces.forEach(p => {
            p.y += p.speed;
            ctx.fillStyle = p.color;
            ctx.fillRect(p.x, p.y, p.size, p.size);
        });
        requestAnimationFrame(update);
    }

    update();
}
</script>
