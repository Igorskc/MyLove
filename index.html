<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kochanieńka ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;
    font-family: "Montserrat", sans-serif;
    color: #fff;
}

/* TŁO */
.parallax {
    position: fixed;
    inset: 0;
    background-image: url("tlo.jpg");
    background-size: cover;
    background-position: center;
    z-index: 0;
}
.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.2);
    z-index: 1;
}

/* KARTA */
.wrapper {
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 16px;
    position: relative;
    z-index: 2;
}

.card {
    max-width: 520px;
    width: 100%;
    padding: 32px 28px;
    background: rgba(20,10,18,0.6);
    backdrop-filter: blur(14px);
    border-radius: 26px;
    text-align: center;
}

/* PRZYCISKI */
button {
    margin-top: 14px;
    padding: 10px 18px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    background: rgba(255,255,255,0.25);
    color: #fff;
    font-size: 1rem;
    transition: 0.3s;
}

button:hover {
    background: rgba(255,255,255,0.4);
}

/* KOMUNIKAT */
#message {
    margin-top: 12px;
    font-size: 0.9rem;
    opacity: 0.85;
}

/* ANIMACJA PREZENTU */
.gift-box {
    font-size: 3.5rem;
    margin-top: 10px;
    transition: transform 0.6s ease, opacity 0.6s ease;
}

.opened {
    transform: scale(1.6) rotate(20deg);
    opacity: 0;
}

.hidden { display: none; }

#contentBox {
    margin-top: 18px;
    font-size: 0.95rem;
    line-height: 1.5;
    animation: fadeIn 0.6s ease forwards;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

/* MUZYKA */
#musicBtn {
    margin-top: 20px;
}
</style>
</head>

<body>

<audio id="bgMusic" loop>
    <source src="muzyka.mp3" type="audio/mpeg">
</audio>

<div class="parallax"></div>
<div class="overlay"></div>

<div class="wrapper">
<div class="card">

<h1>🎁 Prezent dla Ukochanej</h1>

<div class="gift-box" id="giftIcon">❤️</div>

<button id="giftBtn">Odpakuj prezent</button>
<div id="message"></div>

<div id="giftOptions" class="hidden">
    <button onclick="showCategory('stories')">📖 Opowiadania</button>
    <button onclick="showCategory('poems')">✍ Rymowanki / Wierszyki</button>
</div>

<div id="contentBox"></div>

<button id="musicBtn">🎵 Play</button>

</div>
</div>

<script>
// ===== MUZYKA =====
const music = document.getElementById("bgMusic");
const musicBtn = document.getElementById("musicBtn");

document.addEventListener("click", function startMusic() {
    music.volume = 0.3;
    music.play();
    musicBtn.textContent = "⏸ Pauza";
    document.removeEventListener("click", startMusic);
}, { once: true });

musicBtn.addEventListener("click", () => {
    if (music.paused) {
        music.play();
        musicBtn.textContent = "⏸ Pauza";
    } else {
        music.pause();
        musicBtn.textContent = "🎵 Play";
    }
});

// ===== PREZENT =====
const unlockDate = new Date(2026, 2, 27, 0, 0, 0);
const giftBtn = document.getElementById("giftBtn");
const message = document.getElementById("message");
const giftOptions = document.getElementById("giftOptions");
const giftIcon = document.getElementById("giftIcon");
const contentBox = document.getElementById("contentBox");

giftBtn.addEventListener("click", () => {

    const now = new Date();

    if (now < unlockDate) {

        let diff = Math.floor((unlockDate - now) / 1000);

        const days = Math.floor(diff / 86400);
        diff %= 86400;
        const hours = Math.floor(diff / 3600);
        diff %= 3600;
        const minutes = Math.floor(diff / 60);
        const seconds = diff % 60;

        message.innerHTML =
        `Prezent będzie możliwy do otwarcia za:<br>
        ${days} dni ${hours} h ${minutes} min ${seconds} s`;

    } else {

        // animacja
        giftIcon.classList.add("opened");

        setTimeout(() => {
            giftBtn.style.display = "none";
            giftIcon.style.display = "none";
            giftOptions.classList.remove("hidden");
            message.innerHTML = "Prezent został otwarty 💖";
        }, 600);
    }

});

function showCategory(type) {

    if (type === "stories") {
        contentBox.innerHTML = `
        <h3>Opowiadanie 1</h3>
        <p>Tutaj wkleisz swoje pierwsze opowiadanie...</p>
        `;
    }

    if (type === "poems") {
        contentBox.innerHTML = `
        <h3>Wierszyk 1</h3>
        <p>Tutaj wkleisz swój pierwszy wierszyk...</p>
        `;
    }

}
</script>

</body>
</html>
