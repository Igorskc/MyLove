<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kochanieńka ❤️</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
<style>
* {
    box-sizing: border-box;
}
html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;
    font-family: "Montserrat", sans-serif;
    color: #fff;
}

/* === TŁO === */
.parallax {
    position: fixed;
    inset: 0;
    background-image: url("tlo.jpg");
    background-size: cover;
    background-position: center;
    will-change: transform;
    transform: translateY(0);
    z-index: 0;
}
.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.15);
    z-index: 1;
}

/* === KARTA === */
.wrapper {
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 16px;
    position: relative;
    z-index: 2;
}
.card {
    max-width: 520px;
    width: 100%;
    padding: 32px 28px;
    background: rgba(20,10,18,0.55);
    backdrop-filter: blur(12px);
    border-radius: 26px;
    text-align: center;
    box-shadow: 0 30px 80px rgba(0,0,0,0.5);
}
h1 {
    font-family: "Playfair Display", serif;
    font-size: clamp(2rem, 6vw, 2.7rem);
    margin-bottom: 14px;
    color: #ffd1dc;
    text-shadow: 0 0 16px rgba(255,170,200,0.6);
}

/* === SERCE === */
.heart {
    font-size: 4rem;
    margin: 10px 0 22px;
    display: inline-block;
}
.beat {
    animation: beat 0.6s ease-in-out;
}
@keyframes beat {
    0% { transform: scale(1); }
    30% { transform: scale(1.3); }
    60% { transform: scale(0.95); }
    100% { transform: scale(1); }
}

/* === LICZNIKI === */
.label {
    font-size: 0.8rem;
    letter-spacing: 0.15em;
    opacity: 0.7;
    margin-bottom: 6px;
}
.time {
    font-size: 1.4rem;
    font-weight: 600;
    margin-bottom: 20px;
}
.seconds {
    font-family: "Playfair Display", serif;
    font-size: clamp(2.4rem, 9vw, 4.4rem);
    font-weight: 700;
    color: #ffe3ec;
    text-shadow: 0 0 22px rgba(255,200,220,0.75);
}

/* === PRZYCISK MUZYKI === */
#musicBtn {
    margin-top: 16px;
    padding: 10px 18px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    background: rgba(255,255,255,0.25);
    color: #fff;
    font-size: 1rem;
}

/* === UNOSZĄCE SERDUSZKA === */
.floating-heart {
    position: fixed;
    bottom: -40px;
    font-size: 1.4rem;
    animation: floatUp 6s linear forwards;
    pointer-events: none;
    z-index: 3;
}
@keyframes floatUp {
    0% {
        transform: translateY(0) scale(1);
        opacity: 0;
    }
    10% { opacity: 1; }
    100% {
        transform: translateY(-120vh) scale(1.5);
        opacity: 0;
    }
}
</style>
</head>
<body>

<!-- MUZYKA -->
<audio id="bgMusic" loop>
    <source src="muzyka.mp3" type="audio/mpeg">
</audio>

<div class="parallax" id="parallax"></div>
<div class="overlay"></div>

<div class="wrapper">
    <div class="card">
        <h1>Do spełnienia marzeń pozostało</h1>
        <div class="heart" id="heart">❤️</div>
        <div class="label">OGÓLNIE</div>
        <div class="time" id="fullCounter">—</div>
        <div class="label">SEKUNDY</div>
        <div class="seconds" id="secondsCounter">—</div>

        <!-- PRZYCISK PLAY / PAUSE -->
        <button id="musicBtn">🎵 Play</button>
    </div>
</div>

<script>
const music = document.getElementById("bgMusic");
const btn = document.getElementById("musicBtn");

// start po pierwszym kliknięciu gdziekolwiek
function startMusic() {
    music.volume = 0.3;
    music.play();
    btn.textContent = "⏸ Pauza";
    document.removeEventListener("click", startMusic);
    document.removeEventListener("touchstart", startMusic);
}
document.addEventListener("click", startMusic);
document.addEventListener("touchstart", startMusic);

// play / pause przyciskiem
btn.addEventListener("click", () => {
    if (music.paused) {
        music.play();
        btn.textContent = "⏸ Pauza";
    } else {
        music.pause();
        btn.textContent = "🎵 Play";
    }
});
</script>

<script>
document.addEventListener("DOMContentLoaded", function () {
    const heart = document.getElementById("heart");

    function beatHeart() {
        heart.classList.remove("beat");
        void heart.offsetWidth;
        heart.classList.add("beat");
    }
    function floatingHeart() {
        const h = document.createElement("div");
        h.className = "floating-heart";
        h.textContent = "❤️";
        h.style.left = Math.random() * 100 + "vw";
        h.style.fontSize = (1 + Math.random() * 1.5) + "rem";
        document.body.appendChild(h);
        setTimeout(() => h.remove(), 6000);
    }
    function updateCounter() {
        const targetDate = new Date(2026, 1, 14, 15, 0, 0); // 14 lutego 2026, 15:00
        const now = new Date();
        let diff = Math.floor((targetDate - now) / 1000);
        if (diff < 0) diff = 0;
        const days = Math.floor(diff / 86400);
        diff %= 86400;
        const hours = Math.floor(diff / 3600);
        diff %= 3600;
        const minutes = Math.floor(diff / 60);
        const seconds = diff % 60;
        document.getElementById("fullCounter").textContent =
            `${days} dni ${hours} h ${minutes} min ${seconds} s`;
        document.getElementById("secondsCounter").textContent =
            Math.floor((targetDate - now) / 1000).toLocaleString("pl-PL");
        beatHeart();
        floatingHeart();
    }
    updateCounter();
    setInterval(updateCounter, 1000);
});
</script>

</body>
</html>
